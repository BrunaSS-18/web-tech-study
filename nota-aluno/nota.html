<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota do Aluno</title>
    <link rel="stylesheet" href="./css/nota.css">
</head>

<body>
    <main class="container">
        <form>

            <article class="form-control">
                <label for="nome">Digite o nome do aluno:</label>
                <input type="text" id="nome"/>

                <label for="nota">Digite nota do aluno:</label>
                <input type="number" min="0" id="nota" />
            </article>

            <section id="message">
                <span>Digite nos campo(os) vazios</span>
            </section>

            <button id="verifica-nota" onclick="resultadoNotaClick(event)"> Verificar Nota</button>

            <div id="resultado"></div>
        </form>
    </main>
    
    <script src="./js/nota.js"></script>
</body>
</html>
